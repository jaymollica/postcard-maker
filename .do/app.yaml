name: mail-app-unified
services:
# PHP Backend
- name: backend
  source_dir: /be
  build_command: composer install --no-dev --optimize-autoloader
  environment_slug: php
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /be

# React Frontend  
- name: frontend
  source_dir: /fe
  build_command: npm ci && npm run build
  run_command: npx serve -s build -l 8080
  environment_slug: node-js
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /

# Embed Script
- name: embed
  source_dir: /embed
  build_command: npm install && npm run build
  run_command: npx serve -s . -l 8080
  environment_slug: node-js
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /embed